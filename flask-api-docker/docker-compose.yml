# docker-compose.yml
# Orquestra três serviços na mesma rede interna: banco, API e proxy.

version: "3.9"

volumes:
  postgres_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  backend:
    driver: bridge

services:

  db:
    image: postgres:16-alpine
    container_name: taskmanager_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taskmanager}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no arquivo .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser} -d ${POSTGRES_DB:-taskmanager}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: taskmanager_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-appuser}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-taskmanager}
      SECRET_KEY: ${SECRET_KEY:?Defina SECRET_KEY no arquivo .env}
      FLASK_ENV: ${FLASK_ENV:-production}
      PORT: 5000
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # A porta 5000 fica restrita à rede interna.
    # O Nginx é o único ponto de entrada público.
    expose:
      - "5000"

  nginx:
    image: nginx:1.27-alpine
    container_name: taskmanager_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    networks:
      - backend
    depends_on:
      api:
        condition: service_healthy
